<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About · Monkey Business Labs</title>
<link rel="icon" type="image/png" href="MBLabs_Icon.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700;900&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a;
    --dark: #111111;
    --grey-mid: #2a2a2a;
    --yellow: #f5c842;
    --avocado-muted: #8a9e78;
    --white: #f8f6f0;
    --white-soft: #e8e6e0;
    --text-muted: #888880;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--black);
    color: var(--white);
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    overflow-x: hidden;
  }
  .container { max-width: 580px; width: 100%; text-align: center; }
  .icon { width: 100px; margin: 0 auto 24px; display: block; }
  .header { font-size: 15px; color: var(--text-muted); line-height: 1.8; margin-bottom: 48px; font-style: italic; }
  .header strong { color: var(--white-soft); font-style: normal; font-weight: 600; }
  .haiku-wrap {
    border: 1px solid var(--grey-mid);
    border-radius: 16px;
    padding: 40px 40px;
    background: var(--dark);
    margin-bottom: 40px;
    position: relative;
    text-align: left;
  }
  .haiku-label {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--yellow);
    color: var(--black);
    font-family: 'Syne', sans-serif;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 4px 14px;
    border-radius: 100px;
    white-space: nowrap;
  }
  .haiku { font-family: 'Syne', sans-serif; font-size: clamp(20px, 4vw, 30px); font-weight: 800; line-height: 1.7; }
  .haiku-line { display: block; min-height: 1.7em; overflow: hidden; }
  .line1 { color: var(--white); }
  .line2 { color: var(--yellow); }
  .line3 { color: var(--avocado-muted); }
  .cursor {
    display: inline-block;
    width: 3px;
    height: 1em;
    background: var(--yellow);
    margin-left: 2px;
    vertical-align: middle;
    animation: blink 0.7s step-end infinite;
  }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
  .signature {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    color: var(--yellow);
    letter-spacing: 0.1em;
    margin-top: 28px;
    text-align: right;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .back-link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-top: 40px;
    padding: 10px 24px;
    border: 1px solid var(--grey-mid);
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    text-decoration: none;
    transition: all 0.2s;
  }
  .back-link:hover { border-color: var(--yellow); color: var(--yellow); }
  .footer-text { margin-top: 48px; font-size: 11px; color: var(--text-muted); letter-spacing: 0.1em; text-transform: uppercase; }
  .balloon {
    position: fixed;
    font-size: 32px;
    opacity: 0;
    pointer-events: none;
    z-index: 999;
    filter: drop-shadow(0 0 8px rgba(245,200,66,0.6));
  }
  @keyframes float-up {
    0%   { opacity: 1; transform: translateY(0) rotate(-5deg) scale(1); }
    20%  { opacity: 1; transform: translateY(-80px) rotate(5deg) scale(1.1); }
    60%  { opacity: 0.8; transform: translateY(-300px) rotate(-8deg) scale(1.05); }
    100% { opacity: 0; transform: translateY(-700px) rotate(10deg) scale(0.8); }
  }

.generator-wrap {
    margin-top: 40px;
    border: 1px solid var(--grey-mid);
    border-radius: 16px;
    padding: 32px;
    background: var(--dark);
    position: relative;
    text-align: left;
  }
  .generator-label {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
    font-weight: 600;
  }
  textarea {
    width: 100%;
    background: #0a0a0a;
    border: 1px solid var(--grey-mid);
    border-radius: 8px;
    padding: 16px;
    color: var(--white);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px;
    line-height: 1.6;
    resize: vertical;
    min-height: 100px;
    margin-bottom: 16px;
  }
  textarea:focus { outline: none; border-color: var(--yellow); }
  textarea::placeholder { color: var(--text-muted); }
  button {
    width: 100%;
    padding: 14px;
    background: var(--yellow);
    color: var(--black);
    border: none;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .haiku-output {
    margin-top: 24px;
    font-family: 'Syne', sans-serif;
    font-size: clamp(18px, 3vw, 26px);
    font-weight: 800;
    line-height: 1.7;
  }
  .output-line { opacity: 0; transform: translateY(8px); transition: opacity 0.5s ease, transform 0.5s ease; }
  .output-line.visible { opacity: 1; transform: translateY(0); }
  .out-line1 { color: var(--white); }
  .out-line2 { color: var(--yellow); }
  .out-line3 { color: var(--avocado-muted); }
  .loading { text-align: center; color: var(--text-muted); font-size: 13px; margin-top: 16px; animation: pulse 1.5s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .tone-icon { position: fixed; font-size: 40px; opacity: 0; pointer-events: none; z-index: 999; }
  @keyframes float-up {
    0%   { opacity: 1; transform: translateY(0) rotate(-5deg) scale(1); }
    20%  { opacity: 1; transform: translateY(-80px) rotate(5deg) scale(1.1); }
    60%  { opacity: 0.8; transform: translateY(-300px) rotate(-8deg) scale(1.05); }
    100% { opacity: 0; transform: translateY(-700px) rotate(10deg) scale(0.8); }
  }

</style>
</head>
<body>

<div class="container">
  <img src="MBLabs_Icon.png" alt="MB Labs" class="icon">

  <div class="header">
    Were you expecting a bio? We are just here to play ...
    for you I Haiku 🐒
  </div>

  <div class="haiku-wrap">
    <div class="haiku-label">// about</div>
    <div class="haiku">
      <span class="haiku-line line1" id="line1"></span>
      <span class="haiku-line line2" id="line2"></span>
      <span class="haiku-line line3" id="line3"></span>
    </div>
    <div class="signature" id="signature">xoxo DLUX</div>
  </div>

  <!-- RANT TO HAIKU GENERATOR -->
<div class="generator-wrap">
  <div class="generator-label">// rant. we haiku.</div>
  <textarea id="rant-input" placeholder="Tell us about your day... the ticket that's been open 6 months, the meeting that could have been an email, the access you still don't have..."></textarea>
  <button id="generate-btn" onclick="generateHaiku()">🐒 Generate My Rage Haiku</button>
  <div id="haiku-output" class="haiku-output" style="display:none;">
    <div class="output-line line1" id="out1"></div>
    <div class="output-line line2" id="out2"></div>
    <div class="output-line line3" id="out3"></div>
  </div>
  <div id="loading" style="display:none;" class="loading">🐒 channeling your rage...</div>
</div>

<!-- TONE BALLOON -->
<div class="tone-icon" id="tone-icon"></div>

  <a href="index.html" class="back-link">🍌 Back to the Lab</a>
  <div class="footer-text">monkeybusinesslabs.ai · Chief Chaos Engineer</div>
</div>

<div class="balloon" id="balloon">🎈</div>

<script>
  const lines = [
    { id: 'line1', text: 'Where art thou, Neo' },
    { id: 'line2', text: 'Seminal brothers collude' },
    { id: 'line3', text: 'Rise we build at dawn' },
  ];

  const cursor = document.createElement('span');
  cursor.className = 'cursor';

  function typeLine(i) {
    if (i >= lines.length) {
      setTimeout(() => {
        document.getElementById('signature').style.opacity = '1';
        setTimeout(() => launchBalloon(), 3000);
      }, 400);
      return;
    }
    const { id, text } = lines[i];
    const el = document.getElementById(id);
    el.appendChild(cursor);
    let c = 0;
    const iv = setInterval(() => {
      if (c < text.length) {
        el.insertBefore(document.createTextNode(text[c]), cursor);
        c++;
      } else {
        clearInterval(iv);
        setTimeout(() => typeLine(i + 1), 380);
      }
    }, 55);
  }

  function launchBalloon() {
    const rect = cursor.getBoundingClientRect();
    const balloon = document.getElementById('balloon');
    balloon.style.left = (rect.left - 8) + 'px';
    balloon.style.top = (rect.top - 16) + 'px';
    cursor.remove();
    balloon.style.animation = 'float-up 3.5s ease-out forwards';
  }

  setTimeout(() => typeLine(0), 600);

const toneIcons = {
    RAGE: '🔥',
    EXHAUSTED: '😴',
    OVERWHELMED: '💥',
    REBELLIOUS: '🍌',
    DEFEATED: '🌧️',
    VICTORIOUS: '🎈',
    ABSURD: '🐒',
    ENERGIZED: '🚀'
  };

  async function generateHaiku() {
    const rant = document.getElementById('rant-input').value.trim();
    if (!rant) return;

    const btn = document.getElementById('generate-btn');
    const loading = document.getElementById('loading');
    const output = document.getElementById('haiku-output');

    btn.disabled = true;
    loading.style.display = 'block';
    output.style.display = 'none';

    try {
      const res = await fetch('/.netlify/functions/haiku', {
        method: 'POST',
        body: JSON.stringify({ rant })
      });

      const data = await res.json();
      const { haiku, tone } = data;

      document.getElementById('out1').textContent = haiku[0] || '';
      document.getElementById('out2').textContent = haiku[1] || '';
      document.getElementById('out3').textContent = haiku[2] || '';

      document.getElementById('out1').className = 'output-line out-line1';
      document.getElementById('out2').className = 'output-line out-line2';
      document.getElementById('out3').className = 'output-line out-line3';

      loading.style.display = 'none';
      output.style.display = 'block';

      setTimeout(() => document.getElementById('out1').classList.add('visible'), 100);
      setTimeout(() => document.getElementById('out2').classList.add('visible'), 400);
      setTimeout(() => document.getElementById('out3').classList.add('visible'), 700);

      // launch tone icon
      setTimeout(() => launchToneIcon(tone), 1200);

    } catch (err) {
      loading.style.display = 'none';
      btn.disabled = false;
    }
    btn.disabled = false;
  }

  function launchToneIcon(tone) {
    const icon = toneIcons[tone] || '🐒';
    const el = document.getElementById('tone-icon');
    const btn = document.getElementById('generate-btn');
    const rect = btn.getBoundingClientRect();
    el.textContent = icon;
    el.style.left = (rect.left + rect.width / 2) + 'px';
    el.style.top = rect.top + 'px';
    el.style.animation = 'none';
    el.offsetHeight;
    el.style.animation = 'float-up 3.5s ease-out forwards';
  }
</script>
</body>
</html>
